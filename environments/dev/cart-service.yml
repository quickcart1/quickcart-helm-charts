# Dev overrides for cart-service
# Usage: helm install cart-service ./charts/cart-service -n quickkart-dev -f environments/dev/cart-service.yml

replicaCount: 1

image:
  repository: rickdevma100/quickkart-cart-service
  pullPolicy: IfNotPresent
  tag: "1.0.2"

database:
  host: cart-db-postgres
  port: 5432
  name: cartdb
  username: postgres
  password: password

service:
  type: ClusterIP
  port: 8084

resources:
  limits:
    cpu: 800m
    memory: 512Mi
  requests:
    cpu: 400m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70




