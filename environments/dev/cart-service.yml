# Dev overrides for cart-service
# Usage: helm install cart-service ./charts/cart-service -n quickkart-dev -f environments/dev/cart-service.yml

replicaCount: 2

image:
  repository: rickdevma100/quickkart-cart-service
  pullPolicy: IfNotPresent
  tag: "1.0.0"

database:
  host: cart-db-postgres
  port: 5432
  name: cartdb
  username: postgres
  password: password

service:
  type: ClusterIP
  port: 8084

resources:
  limits:
    cpu: 300m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /actuator/health
    port: 8084
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health
    port: 8084
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
