# Production overrides for api-gateway
# Usage: helm install api-gateway ./charts/api-gateway -n quickkart -f environments/prod/api-gateway.yml

replicaCount: 1

image:
  repository: rickdevma100/quickkart-api-gateway
  pullPolicy: Always
  tag: "1.0.2"

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 600m
    memory: 256Mi





autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
