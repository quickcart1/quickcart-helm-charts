# Production overrides for payment-service
# Usage: helm install payment-service ./charts/payment-service -n quickkart -f environments/prod/payment-service.yml

replicaCount: 2

image:
  repository: rickdevma100/quickkart-payment-service
  pullPolicy: Always
  tag: "1.0.0"

service:
  type: ClusterIP
  port: 8086

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: 8086
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8086
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
