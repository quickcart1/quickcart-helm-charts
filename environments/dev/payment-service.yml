# Production overrides for payment-service
# Usage: helm install payment-service ./charts/payment-service -n quickkart -f environments/prod/payment-service.yml

replicaCount: 1

image:
  repository: rickdevma100/quickkart-payment-service
  pullPolicy: Always
  tag: "1.0.0"
database:
  host: payment-db-postgres
  port: 5432
  name: paymentdb
  username: postgres
  password: password

service:
  type: ClusterIP
  port: 8086

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: 8086
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3



autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
