# Dev overrides for user-service
# Usage: helm install user-service ./charts/user-service -n quickkart-dev -f environments/dev/user-service.yml

replicaCount: 1

image:
  repository: rickdevma100/quickkart-user-service
  pullPolicy: IfNotPresent
  tag: "1.0.2"

database:
  host: user-db-postgres
  port: 5432
  name: userdb
  username: postgres
  password: password

service:
  type: ClusterIP
  port: 8081

resources:
  limits:
    cpu: 800m
    memory: 512Mi
  requests:
    cpu: 400m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 40
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  initialDelaySeconds: 40
  periodSeconds: 15


