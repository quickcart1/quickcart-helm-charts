# Dev overrides for order-service
# Usage: helm install order-service ./charts/order-service -n quickkart-dev -f environments/dev/order-service.yml

replicaCount: 1

image:
  repository: rickdevma100/quickkart-order-service
  pullPolicy: IfNotPresent
  tag: "1.0.2"

database:
  host: order-db-postgres
  port: 5432
  name: orderdb
  username: postgres
  password: password

service:
  type: ClusterIP
  port: 8083

resources:
  limits:
    cpu: 800m
    memory: 512Mi
  requests:
    cpu: 400m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

