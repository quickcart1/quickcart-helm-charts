# Production overrides for frontend
# Usage: helm install frontend ./charts/frontend -n quickkart -f environments/prod/frontend.yml

replicaCount: 1

image:
  repository: rickdevma100/quickkart-frontend
  pullPolicy: Always
  tag: "1.0.1"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: quickcart.local
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 800m
    memory: 256Mi
  requests:
    cpu: 400m
    memory: 128Mi





autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
