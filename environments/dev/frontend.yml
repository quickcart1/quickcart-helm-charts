# Production overrides for frontend
# Usage: helm install frontend ./charts/frontend -n quickkart -f environments/prod/frontend.yml

replicaCount: 2

image:
  repository: rickdevma100/quickkart-frontend
  pullPolicy: Always
  tag: "1.0.0"

service:
  type: ClusterIP
  port: 3000

resources:
  limits:
    cpu: 300m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
