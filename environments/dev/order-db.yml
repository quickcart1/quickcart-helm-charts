# Dev overrides for order-db
# Usage: helm install order-db ./charts/db/order-db -n quickkart-dev -f environments/dev/order-db.yml

image:
  repository: postgres
  pullPolicy: IfNotPresent
  tag: "17"

port: 5432

database: orderdb
username: postgres
password: password

persistence:
  enabled: true
  storageClass: microk8s-hostpath
  accessModes: ReadWriteOnce
  size: 512Mi

resources:
  requests:
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"
