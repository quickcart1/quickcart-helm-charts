# Dev overrides for inventory-service
# Usage: helm install inventory-service ./charts/inventory-service -n quickkart-dev -f environments/dev/inventory-service.yml

replicaCount: 1

image:
  repository: rickdevma100/quickkart-inventory-service
  pullPolicy: IfNotPresent
  tag: "1.0.1"

database:
  host: inventory-db-postgres
  port: 5432
  name: inventorydb
  username: postgres
  password: password

service:
  type: ClusterIP
  port: 8085

resources:
  limits:
    cpu: 800m
    memory: 256Mi
  requests:
    cpu: 400m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80


