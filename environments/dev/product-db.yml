# Dev overrides for product-db
# Usage: helm install product-db ./charts/db/product-db -n quickkart-dev -f environments/dev/product-db.yml

image:
  repository: postgres
  pullPolicy: IfNotPresent
  tag: "17"

port: 5432

database: productdb
username: postgres
password: password

persistence:
  enabled: true
  storageClass: microk8s-hostpath
  accessModes: ReadWriteOnce
  size: 512Mi

resources:
  requests:
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 3